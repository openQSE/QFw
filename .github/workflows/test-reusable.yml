# Reusable Test Workflow
#
# This workflow contains the actual test logic for QFw. It is called by
# test-pr.yml, test-main.yml, and test-release.yml so that PR and main branch
# builds always run identical steps (no skew).
#
# Current CI scope:
#   - Flake8 linting (using DEFw/.flake8 config)
#   - Python syntax checks across all source
#
# Note: QFw integration tests require a running distributed framework
# (PRTE, DEFw, QPM services, simulator binaries) and cannot run on standard
# GitHub Actions runners. They are run manually or on dedicated hardware.
# When self-hosted runners or a containerized stack become available, add
# integration test steps here.
#
# To modify CI behavior for PRs vs main vs release, edit the caller workflows.

name: Reusable Test Workflow

on:
  workflow_call:
    inputs:
      upload_artifacts:
        description: 'Whether to upload test artifacts (true for main/release, false for PRs)'
        required: false
        type: boolean
        default: false

jobs:
  lint-and-syntax:
    name: Lint and syntax check (Python ${{ matrix.python-version }})
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive  # DEFw submodule required for .flake8 config

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install flake8
      run: python -m pip install --upgrade pip flake8

    - name: Run CI checks
      # All check logic lives in scripts/ci-checks.sh — edit there to change what CI runs.
      # The same script can be run locally: ./scripts/ci-checks.sh
      run: bash scripts/ci-checks.sh
