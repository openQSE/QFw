# Reusable Test Workflow
#
# This workflow contains the actual test logic for QFw. It is called by
# test-pr.yml, test-main.yml, and test-release.yml so that PR and main branch
# builds always run identical steps (no skew).
#
# Current CI scope:
#   - ci-checks: Flake8 linting and Python syntax checks
#   - ci-mock: pytest tests under tests/mock
#
# Note: QFw integration tests require a running distributed framework
# (PRTE, DEFw, QPM services, simulator binaries) and cannot run on standard
# GitHub Actions runners. They are run manually or on dedicated hardware.
# When self-hosted runners or a containerized stack become available, add
# integration test steps here.
#
# To modify CI behavior for PRs vs main vs release, edit the caller workflows.

name: Reusable Test Workflow

on:
  workflow_call:
    inputs:
      upload_artifacts:
        description: 'Whether to upload test artifacts (true for main/release, false for PRs)'
        required: false
        type: boolean
        default: false
      python_versions:
        description: 'JSON array of Python versions to test'
        required: false
        type: string
        default: '["3.10", "3.12"]'

jobs:
  ci-checks:
    name: ci-checks (Python ${{ matrix.python-version }})
    strategy:
      matrix:
        python-version: ${{ fromJSON(inputs.python_versions) }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive  # DEFw submodule required for .flake8 config

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install flake8
      run: python -m pip install --upgrade pip flake8

    - name: Run ci-checks
      # The ci-checks helper lives in .github/scripts so CI support files stay
      # with the workflow definitions. Developers can run it locally as:
      #   ./.github/scripts/ci-checks.sh
      run: bash .github/scripts/ci-checks.sh

  ci-mock:
    name: ci-mock (Python ${{ matrix.python-version }})
    strategy:
      matrix:
        python-version: ${{ fromJSON(inputs.python_versions) }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive  # DEFw submodule required for .flake8 config

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install pytest
      run: python -m pip install --upgrade pip pytest

    - name: Run ci-mock
      # The ci-mock helper mirrors the CI-safe mock pytest suite.
      # Developers can run it locally as:
      #   ./.github/scripts/ci-mock.sh
      run: bash .github/scripts/ci-mock.sh
